global:
  seed: 0
  d: 32
  k: 32
  seq_length: 128
  test_set_size: 1024
  track_set_size: 1024
  track_source: test  # options: test, sample, mixture_centers
  output_dir: outputs/
  # data_generator:
  #   _target_: utils.data_generator.RademacherInputGenerator
  data_generator:
    _target_: utils.data_generator.MixtureInputGenerator
    num_mix: 32
    sigma: 0.05

experiment:
  seed: 0
  reward_type: process  # options: outcome or process
  initial_likelihood_threshold: 1e-9
  max_tracked_samples: 512

  supervised:
    steps: 1000
    batch_size: 256
    optimizer:
      _target_: torch.optim.Adagrad
      _partial_: true
      lr: 0.1
    test_every: 50

  pg:
    steps: 1000
    batch_size: 256
    optimizer:
      _target_: torch.optim.Adagrad
      _partial_: true
      lr: 0.1
    test_every: 50
    track_every: 2
    baseline: false
    behavior:
      # _target_: utils.behavior_policy.OnPolicyBehavior
      # _target_: utils.behavior_policy.EpsilonMixtureBehavior
      # k: ${global.k}
      # epsilon: 0.5
      _target_: utils.behavior_policy.BoMProcessPolicy
      m: 10
      base_policy:
        _target_: utils.behavior_policy.EpsilonMixtureBehavior
        k: ${global.k}
        epsilon: 0.5

  base_likelihood_histogram_bins: 120

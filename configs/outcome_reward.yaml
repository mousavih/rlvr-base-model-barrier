global:
  seed: 0
  d: 32
  k: 32
  seq_length: 128
  test_set_size: 1024
  track_set_size: 1024
  track_source: mixture_centers  # options: test, sample, mixture_centers
  output_dir: outputs/
  # data_generator:
  #   _target_: utils.data_generator.RademacherInputGenerator
  data_generator:
    _target_: utils.data_generator.MixtureInputGenerator
    num_mix: 32
    sigma: 0.05

experiment:
  seed: 0
  likelihood_tracking_type: uniform  # options: uniform, threshold
  # initial_likelihood_threshold: 1e-12   # required when likelihood_tracking_type=threshold
  # max_tracked_samples: 512             # optional cap for threshold mode
  supervised:
    steps: 1000
    batch_size: 256
    optimizer:
      _target_: torch.optim.Adagrad
      _partial_: true
      lr: 0.1
    test_every: 50
  pg:
    steps: 4000
    batch_size: 1024
    optimizer:
      _target_: torch.optim.Adagrad
      _partial_: true
      lr: 0.1
    test_every: 50
    track_every: 1
    baseline: fasle
    behavior:
      _target_: utils.behavior_policy.OnPolicyBehavior
  track_initial_quantiles: 16
  base_likelihood_histogram_bins: 120
